apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: app2-prod
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
    destination:
        name: in-cluster
        namespace: app2-prod
    source:
        path: "HelmCharts/MyChart2"
        repoURL: "http://192.168.1.124/devops/argocd-one-cluster.git"
        targetRevision: HEAD
        helm:
            valueFiles:
                - values_prod.yaml
            parameters:
                - name: "container.image"
                  value: yenzedm/flask-test:latest
    project: default
    syncPolicy:
        automated:
            prune: true
            selfHeal: true
        syncOptions:
            - CreateNamespace=true
